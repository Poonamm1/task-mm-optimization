# DB (dummy values for local/learning use — override via env vars in real envs)
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=dummy_db
spring.datasource.username=dummy_user
spring.datasource.password=dummy_password
#spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect

# Worker loop
optimizer.worker.ms=500
optimizer.worker.batch-size=10
optimizer.worker.max-retries=3
##TODO: Make this configurable
optimizer.ttl.seconds=90

# If request doesn't include weights, fall back to these:
optimizer.weights.normal.wPriority=2.0
optimizer.weights.normal.wDistance=1.25
optimizer.weights.normal.wAge=0.6
optimizer.weights.normal.wType=0.4
optimizer.weights.normal.wCongestion=0.8
optimizer.weights.normal.sameAreaBonus=0.1

optimizer.weights.coldStart.wPriority=2.2
optimizer.weights.coldStart.wDistance=0.0
optimizer.weights.coldStart.wAge=0.8
optimizer.weights.coldStart.wType=0.5
optimizer.weights.coldStart.wCongestion=0.8
optimizer.weights.coldStart.sameAreaBonus=0.1

logging.level.root=INFO
logging.level.com.yourorg.optimizer.worker=DEBUG


optimizer.selector.use-ortools=false
# flip to true to enable CP-SAT
optimizer.selector.k=10
optimizer.selector.congested-aisle-threshold=0.75
optimizer.selector.congested-aisle-max=1


optimizer.results.filterNonActive=true
optimizer.results.activeStatusCodes=1,2,3


# TTL the worker writes into optimizer_results.ttl_seconds
# IMPORTANT: Use "ttl-seconds" (hyphen) or "ttlSeconds" to bind to ttlSeconds.
#optimizer.ttl-seconds=90

# Model/config identifier stamped into results.meta.modelVersion
optimizer.model-version=v5a-2025-08-23
